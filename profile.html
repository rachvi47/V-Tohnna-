<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V-Tohnna IAM Profile</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.header{
background:#1e2a38;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
margin-bottom:20px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px;
background:#007BFF;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.profileCard{
text-align:center;
}

.profileCard img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #007BFF;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>V-Tohnna IAM Profile</h2>

<div>
User: <b id="username"></b> |
Role: <b id="role"></b>
</div>

</div>

<div class="container">

<!-- ADMIN PANEL -->

<div class="box" id="adminPanel">

<h3>Create Employee Profile</h3>

<input id="empid" placeholder="Employee ID">

<button onclick="findUser()">Find Employee</button>

<input id="name" placeholder="Employee Name" disabled>

<input type="file" id="photo">

<input id="idnum" placeholder="ID Number">

<input id="phone" placeholder="Phone Number">

<input id="email" placeholder="Email">

<input id="grad" placeholder="Graduation">

<input id="college" placeholder="College">

<input id="marks" placeholder="Marks">

<button onclick="saveProfile()">Save Profile</button>

</div>


<!-- PROFILE VIEW -->

<div class="box">

<h3>My Profile</h3>

<div id="profileView" class="profileCard"></div>

</div>

<a href="dashboard.html">
<button>Back to Dashboard</button>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyDOmNu5GsxWLWGw6FACF40vEZ7-rkCQGZc",
authDomain: "v-tohnna-d8fd0.firebaseapp.com",
projectId: "v-tohnna-d8fd0",
storageBucket: "v-tohnna-d8fd0.firebasestorage.app",
messagingSenderId: "929268606043",
appId: "1:929268606043:web:1b806754745934eaa30b7e",
measurementId: "G-DB4SW4K8M2"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);


/* SESSION */

let username = localStorage.getItem("username")
let role = localStorage.getItem("role")

if(!username){

window.location.href="index.html"

}

document.getElementById("username").innerText=username
document.getElementById("role").innerText=role

if(role!=="Admin"){

document.getElementById("adminPanel").style.display="none"

}


/* FIND EMPLOYEE */

window.findUser = async function(){

let empid=document.getElementById("empid").value

const snapshot=await getDocs(collection(db,"users"))

let name=""
let empUser=""

snapshot.forEach(doc=>{

let u=doc.data()

let idPart=u.userid.split(" - ")[0]

if(idPart===empid){

name=u.fullname
empUser=u.username

}

})

document.getElementById("name").value=name

window.employeeUsername=empUser

}


/* SAVE PROFILE */

window.saveProfile = async function(){

let empUser=window.employeeUsername

if(!empUser){

alert("Employee not found")
return

}

let photoFile=document.getElementById("photo").files[0]

let photoURL=""

if(photoFile){

let storageRef=ref(storage,"profiles/"+empUser+".jpg")

await uploadBytes(storageRef,photoFile)

photoURL=await getDownloadURL(storageRef)

}

let profile={

username:empUser,
empid:document.getElementById("empid").value,
name:document.getElementById("name").value,
idnum:document.getElementById("idnum").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
graduation:document.getElementById("grad").value,
college:document.getElementById("college").value,
marks:document.getElementById("marks").value,
photo:photoURL

}

await addDoc(collection(db,"profiles"),profile)

alert("Profile created for employee")

}


/* LOAD PROFILE */

async function loadProfile(){

const q=query(collection(db,"profiles"),where("username","==",username))

const snapshot=await getDocs(q)

let view=document.getElementById("profileView")

snapshot.forEach(doc=>{

let p=doc.data()

view.innerHTML=`

<img src="${p.photo || ''}">

<h3>${p.name}</h3>

<b>ID:</b> ${p.idnum}<br>

<b>Phone:</b> ${p.phone}<br>

<b>Email:</b> ${p.email}<br>

<b>Graduation:</b> ${p.graduation}<br>

<b>College:</b> ${p.college}<br>

<b>Marks:</b> ${p.marks}

`

})

}

loadProfile()

</script>

</body>
</html>
