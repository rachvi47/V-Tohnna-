
<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>V-Tohnna Employee Chat</title>  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>  <style>  
  
body{  
margin:0;  
font-family:Segoe UI;  
background:#f0f2f5;  
height:100vh;  
display:flex;  
flex-direction:column;  
}  
  
.header{  
background:#1e2a38;  
color:white;  
padding:12px 20px;  
display:flex;  
justify-content:space-between;  
}  
  
.main{  
flex:1;  
display:flex;  
}  
  
.sidebar{  
width:300px;  
background:white;  
border-right:1px solid #ddd;  
display:flex;  
flex-direction:column;  
}  
  
.chat-item{  
padding:14px;  
border-bottom:1px solid #eee;  
cursor:pointer;  
display:flex;  
justify-content:space-between;  
}  
  
.chat-item:hover{  
background:#f5f5f5;  
}  
  
.badge{  
background:#28a745;  
color:white;  
padding:2px 7px;  
border-radius:20px;  
font-size:12px;  
}  
  
.online-dot{  
width:8px;  
height:8px;  
background:#28a745;  
border-radius:50%;  
display:inline-block;  
margin-left:6px;  
}  
  
.chat-window{  
flex:1;  
display:flex;  
flex-direction:column;  
}  
  
#chat-header{  
background:white;  
padding:12px;  
border-bottom:1px solid #ddd;  
font-weight:600;  
}  
  
.messages{  
flex:1;  
overflow:auto;  
padding:20px;  
display:flex;  
flex-direction:column;  
gap:8px;  
background:#e5ddd5;  
}  
  
.msg{  
max-width:70%;  
padding:10px;  
border-radius:8px;  
}  
  
.sent{  
align-self:flex-end;  
background:#dcf8c6;  
}  
  
.received{  
align-self:flex-start;  
background:white;  
}  
  
.time{  
font-size:10px;  
color:#777;  
text-align:right;  
}  
  
.input-area{  
display:flex;  
gap:6px;  
padding:10px;  
background:#f0f0f0;  
}  
  
#msg-input{  
flex:1;  
padding:10px;  
border-radius:20px;  
border:1px solid #ccc;  
}  
  
.send-btn{  
background:#007bff;  
color:white;  
border:none;  
padding:10px 16px;  
border-radius:20px;  
cursor:pointer;  
}  
  
</style>  </head>  <body>  <div class="header">  
<b>V-Tohnna Secure Employee Chat</b>  
<div>ID: <span id="my-id"></span></div>  
</div>  <div class="main">  <div class="sidebar">  <div style="padding:15px;font-weight:600;">Employees</div>  <div id="chat-list"></div>  </div>  <div class="chat-window">  <div id="chat-header">  
Select Employee  
<button onclick="clearChat()" style="float:right;background:red;color:white;border:none;padding:6px 10px;border-radius:6px;">Clean Chat</button>  
</div>  <div id="messages" class="messages"></div>  <div class="input-area">  <input id="msg-input" placeholder="Type message">  <input type="file" id="file" hidden>  <button onclick="file.click()">📎</button>

<button class="send-btn" onclick="sendMessage()">Send</button>

</div>  </div>  </div>  <script type="module">  
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";  
  
import {  
getFirestore,  
collection,  
addDoc,  
query,  
orderBy,  
onSnapshot,  
doc,  
updateDoc,  
deleteDoc,  
getDocs,  
setDoc  
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";  
  
/* Firebase */  
  
const firebaseConfig={  
apiKey:"AIzaSyDOmNu5GsxWLWGw6FACF40vEZ7-rkCQGZc",  
authDomain:"v-tohnna-d8fd0.firebaseapp.com",  
projectId:"v-tohnna-d8fd0",  
storageBucket:"v-tohnna-d8fd0.appspot.com",  
messagingSenderId:"929268606043",  
appId:"1:929268606043:web:1b806754745934eaa30b7e"  
};  
  
const app=initializeApp(firebaseConfig);  
const db=getFirestore(app);  
  
/* USER LOGIN */  
  
let myID=localStorage.getItem("employeeID");  
  
if(!myID){  
  
myID=prompt("Enter Employee ID");  
  
localStorage.setItem("employeeID",myID);  
  
}  
  
document.getElementById("my-id").innerText=myID;  
  
/* ONLINE STATUS */  
  
setDoc(doc(db,"status",myID),{  
online:true,  
lastSeen:Date.now()  
});  
  
window.addEventListener("beforeunload",()=>{  
setDoc(doc(db,"status",myID),{  
online:false,  
lastSeen:Date.now()  
});  
});  
  
/* STATE */  
  
let employees={};  
let selectedUser=null;  
  
/* ENCRYPTION */  
  
const SECRET="v-secure";  
  
function encrypt(t){  
return CryptoJS.AES.encrypt(t,SECRET).toString();  
}  
  
function decrypt(c){  
try{  
return CryptoJS.AES.decrypt(c,SECRET).toString(CryptoJS.enc.Utf8);  
}catch{  
return "";  
}  
}  
  
/* LOAD EMPLOYEES */  
  
async function loadEmployees(){  
  
const snap=await getDocs(collection(db,"employees"));  
  
snap.forEach(d=>{  
employees[d.id]=d.data().name;  
});  
  
renderEmployeeList();  
  
}  
  
loadEmployees();  
  
/* RENDER EMPLOYEE LIST */  
  
function renderEmployeeList(){  
  
const list=document.getElementById("chat-list");  
  
list.innerHTML="";  
  
Object.keys(employees).forEach(id=>{  
  
if(id===myID) return;  
  
const div=document.createElement("div");  
  
div.className="chat-item";  
  
div.innerHTML=`  
<span>${employees[id]}</span>  
<span id="online-${id}"></span>  
`;  
  
div.onclick=()=>openChat(id);  
  
list.appendChild(div);  
  
/* ONLINE WATCH */  
  
onSnapshot(doc(db,"status",id),(s)=>{  
  
if(!s.exists()) return;  
  
const st=s.data();  
  
document.getElementById("online-"+id).innerHTML=  
st.online?'<span class="online-dot"></span>':"";  
  
});  
  
});  
  
}  
  
/* OPEN CHAT */  
  
function openChat(user){  
  
selectedUser=user;  
  
document.getElementById("chat-header").innerText=  
employees[user]+" ("+user+")";  
  
const q=query(collection(db,"messages"),orderBy("timestamp","asc"));  
  
onSnapshot(q,(snap)=>{  
  
messages.innerHTML="";  
  
snap.docs.forEach(d=>{  
  
const m=d.data();  
  
if(  
(m.from===myID&&m.to===user)||  
(m.from===user&&m.to===myID)  
){  
  
const div=document.createElement("div");  
  
div.className="msg "+(m.from===myID?"sent":"received");  
  
let content="";  
  
if(m.file){  
  
content=`<a href="${m.file}" download="${m.filename}">📎 ${m.filename}</a>`;  
  
}else{  
  
content=decrypt(m.message);  
  
}  
  
div.innerHTML=`  
<div>${content}</div>  
<div class="time">${m.time}</div>  
`;  
  
messages.appendChild(div);  
  
}  
  
});  
  
messages.scrollTop=messages.scrollHeight;  
  
});  
  
}  
  
/* SEND MESSAGE */  
  
window.sendMessage=async function(){  
  
const input=document.getElementById("msg-input");  
  
if(!selectedUser||!input.value.trim()) return;  
  
await addDoc(collection(db,"messages"),{  
  
from:myID,  
to:selectedUser,  
message:encrypt(input.value),  
timestamp:Date.now(),  
time:new Date().toLocaleTimeString()  
  
});  
  
input.value="";  
  
}  
  
/* FILE SHARE */  
  
file.onchange=async function(){  
  
const f=this.files[0];  
  
const reader=new FileReader();  
  
reader.onload=async function(){  
  
await addDoc(collection(db,"messages"),{  
  
from:myID,  
to:selectedUser,  
file:reader.result,  
filename:f.name,  
timestamp:Date.now(),  
time:new Date().toLocaleTimeString()  
  
});  
  
};  
  
reader.readAsDataURL(f);  
  
}  
  
/* CLEAR CHAT */  
  
async function clearChat(){  
  
if(!selectedUser) return;  
  
if(!confirm("Delete this chat?")) return;  
  
const q=query(collection(db,"messages"));  
  
const snap=await getDocs(q);  
  
snap.forEach(async d=>{  
  
const m=d.data();  
  
if(  
(m.from===myID&&m.to===selectedUser)||  
(m.from===selectedUser&&m.to===myID)  
){  
  
await deleteDoc(doc(db,"messages",d.id));  
  
}  
  
});  
  
}  
  
</script>  </body>  
</html>
