
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Tohnna Secure Chat</title><script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script><style>

:root{
--primary:#007BFF;
--green:#25d366;
--bg:#f0f2f5;
--dark:#1e2a38;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:var(--dark);
color:white;
padding:10px 15px;
display:flex;
justify-content:space-between;
}

/* LAYOUT */

.main{
flex:1;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:white;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:10px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
}

.search{
padding:8px;
border:none;
border-bottom:1px solid #eee;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:12px;
border-bottom:1px solid #f1f1f1;
cursor:pointer;
position:relative;
}

.chat-item:hover{
background:#f5f5f5;
}

.unread{
position:absolute;
right:10px;
top:10px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:10px;
}

/* CHAT AREA */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:#e5ddd5;
}

.chat-header{
background:#ededed;
padding:10px;
display:flex;
justify-content:space-between;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:70%;
padding:10px;
border-radius:8px;
font-size:14px;
}

.sent{
align-self:flex-end;
background:#dcf8c6;
}

.received{
align-self:flex-start;
background:white;
}

.time{
font-size:10px;
color:#777;
text-align:right;
}

/* INPUT */

.input{
display:flex;
padding:10px;
gap:6px;
background:#f0f0f0;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.send{
background:var(--primary);
color:white;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.file{
background:var(--green);
color:white;
border:none;
padding:8px 10px;
border-radius:20px;
cursor:pointer;
}

/* NEW CHAT MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
width:350px;
padding:20px;
border-radius:8px;
max-height:80vh;
overflow:auto;
}

/* MOBILE */

@media(max-width:700px){
.sidebar{width:200px}
}

</style></head><body><div class="header">
<b>V-Tohnna Secure</b>
<div>ID: <span id="myid"></span> | <span id="myname"></span></div>
</div><div class="main"><div class="sidebar"><div class="sidebar-header">
<span>Chats</span>
<button onclick="openNewChat()">+ New</button>
</div><input class="search" id="search" placeholder="Search chats"><div class="chat-list" id="chatlist"></div></div><div class="chat"><div class="chat-header">
<div id="chatname">Select Chat</div>
<button onclick="clearChat()">Clear</button>
</div><div class="messages" id="messages"></div><div class="input"><input type="file" id="file" hidden>
<button class="file" onclick="file.click()">📎</button><input id="msg" placeholder="Type message">
<button class="send" onclick="send()">Send</button></div></div></div><!-- NEW CHAT MODAL --><div class="modal" id="newChatModal"><div class="modal-box"><h3>Start New Chat</h3><input id="userSearch" placeholder="Search name or ID" style="width:100%;padding:8px;margin-bottom:10px"><div id="userList"></div><button onclick="closeNewChat()">Close</button>

</div></div><script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
getDocs,
doc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyDOmNu5GsxWLWGw6FACF40vEZ7-rkCQGZc",
authDomain:"v-tohnna-d8fd0.firebaseapp.com",
projectId:"v-tohnna-d8fd0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* SECURITY */

const SECRET="v-secure";

/* USER INFO */

let myID=localStorage.getItem("userid");
let myName=localStorage.getItem("username");

let selected=null;
let allUsers=[];

document.getElementById("myid").innerText=myID?.split(" - ")[0];
document.getElementById("myname").innerText=myName;

/* ENCRYPTION */

function encrypt(t){
return CryptoJS.AES.encrypt(t,SECRET).toString();
}

function decrypt(c){
try{
return CryptoJS.AES.decrypt(c,SECRET).toString(CryptoJS.enc.Utf8);
}catch{
return "";
}
}

/* LOAD RECENT CHATS */

function loadChats(){

const q=query(collection(db,"messages"),orderBy("timestamp","desc"));

onSnapshot(q,snap=>{

let map=new Map();

snap.docs.forEach(d=>{

let m=d.data();

if(m.from!==myID && m.to!==myID) return;

let other=m.from===myID?m.to:m.from;

if(!map.has(other)){
map.set(other,{msg:m.message,read:m.read});
}

});

const list=document.getElementById("chatlist");
list.innerHTML="";

map.forEach((v,k)=>{

let div=document.createElement("div");
div.className="chat-item";

div.innerHTML=`
<b>${k.split(" - ")[1]}</b>
<br>
<small>${decrypt(v.msg)}</small>
${!v.read?'<span class="unread">!</span>':""}
`;

div.onclick=()=>openChat(k);

list.appendChild(div);

});

});

}

/* OPEN CHAT */

function openChat(user){

selected=user;

document.getElementById("chatname").innerText=user;

const q=query(collection(db,"messages"),orderBy("timestamp","asc"));

onSnapshot(q,snap=>{

const area=document.getElementById("messages");
area.innerHTML="";

snap.docs.forEach(d=>{

let m=d.data();

if((m.from===myID && m.to===user)||(m.from===user && m.to===myID)){

let div=document.createElement("div");

div.className="msg "+(m.from===myID?"sent":"received");

let content=m.file
? `<a href="${m.file}" download>${m.filename}</a>`
: decrypt(m.message);

div.innerHTML=`${content}<div class="time">${m.time}</div>`;

/* MESSAGE ACTION */

div.oncontextmenu=(e)=>{

e.preventDefault();

let choice=confirm("Delete this message?\nOK = Delete\nCancel = Edit");

if(choice){

deleteDoc(doc(db,"messages",d.id));

}else{

let newMsg=prompt("Edit Message",decrypt(m.message));

if(newMsg){

updateDoc(doc(db,"messages",d.id),{
message:encrypt(newMsg)
});

}

}

};

area.appendChild(div);

}

});

area.scrollTop=area.scrollHeight;

});

}

/* SEND MESSAGE */

window.send=async function(){

let inp=document.getElementById("msg");

if(!selected||!inp.value.trim()) return;

await addDoc(collection(db,"messages"),{
from:myID,
to:selected,
message:encrypt(inp.value),
timestamp:Date.now(),
time:new Date().toLocaleTimeString(),
read:false
});

inp.value="";

}

/* FILE SEND */

file.onchange=async function(){

let f=this.files[0];

if(!f||!selected) return;

let reader=new FileReader();

reader.onload=async e=>{

await addDoc(collection(db,"messages"),{
from:myID,
to:selected,
file:e.target.result,
filename:f.name,
timestamp:Date.now(),
time:new Date().toLocaleTimeString()
});

};

reader.readAsDataURL(f);

}

/* CLEAR CHAT */

window.clearChat=async function(){

if(!confirm("Clear chat?")) return;

const snap=await getDocs(collection(db,"messages"));

snap.forEach(async d=>{

let m=d.data();

if(
(m.from===myID && m.to===selected) ||
(m.from===selected && m.to===myID)
){

await deleteDoc(doc(db,"messages",d.id));

}

});

}

/* LOAD USERS */

async function loadUsers(){

const snap=await getDocs(collection(db,"users"));

allUsers=snap.docs
.map(d=>d.data())
.filter(u=>u.userid!==myID);

renderUserList();

}

/* RENDER USER LIST */

function renderUserList(filter=""){

const list=document.getElementById("userList");

list.innerHTML="";

allUsers
.filter(u=>
u.userid.toLowerCase().includes(filter) ||
u.fullname.toLowerCase().includes(filter)
)

.forEach(u=>{

let div=document.createElement("div");

div.style.padding="10px";
div.style.borderBottom="1px solid #eee";
div.style.cursor="pointer";

div.innerHTML=`
<b>${u.fullname}</b>
<br>
<small>${u.userid}</small>
`;

div.onclick=()=>{

openChat(u.userid);

closeNewChat();

};

list.appendChild(div);

});

}

/* USER SEARCH */

document.getElementById("userSearch").addEventListener("input",e=>{

renderUserList(e.target.value.toLowerCase());

});

/* MODAL */

window.openNewChat=()=>{

document.getElementById("newChatModal").style.display="flex";

renderUserList();

}

window.closeNewChat=()=>{

document.getElementById("newChatModal").style.display="none";

}

/* INITIALIZE */

loadChats();
loadUsers();

</script></body>
</html>
