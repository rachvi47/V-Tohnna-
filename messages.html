<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Tohnna Secure Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #007BFF; --whatsapp-green: #25d366; --bg-gray: #f0f2f5; --dark-blue: #1e2a38; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .header { background: var(--dark-blue); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; height: 56px; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 350px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }

        .chat-item { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; flex-direction: column; position: relative; }
        .chat-item:hover { background: #f5f6f7; }
        .chat-item.active { background: #e7f3ff; }

        .emp-id-label { font-size: 11px; color: var(--primary); font-weight: bold; }
        .unread-dot { background: var(--whatsapp-green); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; position: absolute; right: 15px; top: 20px; }

        /* Chat Window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }

        #chat-active { display: none; flex-direction: column; height: calc(100vh - 56px); }
        #active-title { padding:15px; background:#ededed; font-weight:bold; border-bottom:1px solid #ccc; }

        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 8px; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg.received { align-self: flex-start; background: white; }
        .time { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        #chat-placeholder { flex:1; display:flex; align-items:center; justify-content:center; color:#888; }

        /* Modal / Search */
        #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 10px; padding: 20px; max-height: 80vh; display: flex; flex-direction: column; }
        .user-search-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .user-result-list { flex: 1; overflow-y: auto; border-top: 1px solid #eee; }
        .user-result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-result-item:hover { background: #f0f2f5; }

        /* Controls */
        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        input#msg-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .btn-new { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* Mobile fixes */
        @media (max-width: 768px) {
            .input-area {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                padding: 10px;
                background: #f0f0f0;
                z-index: 1000;
                box-sizing: border-box;
            }
            .messages-area { padding-bottom: 60px; }
        }
    </style>
</head>
<body>

<div class="header">
    <b>V-Tohnna Secure</b>
    <div id="user-info">ID: <span id="my-id"></span> | <span id="my-name"></span></div>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Recent Chats</span>
            <button class="btn-new" onclick="toggleModal(true)">+ New Chat</button>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <div class="chat-window">
        <div id="chat-active">
            <div id="active-title"></div>
            <div class="messages-area" id="messages-area"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="border:none; background:var(--primary); color:white; padding:10px 20px; border-radius:20px; cursor:pointer;">Send</button>
            </div>
        </div>
        <div id="chat-placeholder">Select a chat to start</div>
    </div>
</div>

<div id="search-modal">
    <div class="modal-content">
        <h3>Start New Chat</h3>
        <input type="text" class="user-search-input" id="user-search" placeholder="Search Employee ID or Name..." oninput="filterUsers()">
        <div class="user-result-list" id="user-results"></div>
        <button onclick="toggleModal(false)" style="margin-top:10px; padding:8px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, addDoc, orderBy, updateDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOmNu5GsxWLWGw6FACF40vEZ7-rkCQGZc",
        authDomain: "v-tohnna-d8fd0.firebaseapp.com",
        projectId: "v-tohnna-d8fd0",
        storageBucket: "v-tohnna-d8fd0.firebasestorage.app",
        messagingSenderId: "929268606043",
        appId: "1:929268606043:web:1b806754745934eaa30b7e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const SECRET_KEY = "v-secure-123";

    let myFullID = localStorage.getItem("userid");
    let myName = localStorage.getItem("username");
    let selectedUser = null;
    let unsubMessages = null;
    let allUsers = [];

    document.getElementById("my-id").innerText = myFullID?.split(" - ")[0];
    document.getElementById("my-name").innerText = myName;

    function init() {
        const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("chat-list");
            const recentMap = new Map();
            const unread = {};

            snapshot.docs.forEach(d => {
                const m = d.data();
                const other = (m.from === myFullID) ? m.to : m.from;
                if (!recentMap.has(other)) recentMap.set(other, { msg: decrypt(m.message), id: other });
                if (m.to === myFullID && !m.read) unread[m.from] = (unread[m.from] || 0) + 1;
            });

            list.innerHTML = "";
            recentMap.forEach((data, userId) => {
                const div = document.createElement("div");
                div.className = `chat-item ${selectedUser === userId ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="emp-id-label">${userId.split(" - ")[0]}</span>
                    <b>${userId.split(" - ")[1]}</b>
                    <span class="last-msg">${data.msg}</span>
                    ${unread[userId] ? `<span class="unread-dot">${unread[userId]}</span>` : ''}
                `;
                div.onclick = () => openChat(userId);
                list.appendChild(div);
            });
        });
        loadAllUsers();
    }

    async function loadAllUsers() {
        const snap = await getDocs(collection(db, "users"));
        allUsers = snap.docs.map(d => d.data()).filter(u => u.userid !== myFullID);
    }

    window.toggleModal = (show) => {
        document.getElementById("search-modal").style.display = show ? "flex" : "none";
        if(show) filterUsers();
    }

    window.filterUsers = () => {
        const term = document.getElementById("user-search").value.toLowerCase();
        const results = document.getElementById("user-results");
        results.innerHTML = "";
        allUsers.filter(u => u.userid.toLowerCase().includes(term) || u.fullname.toLowerCase().includes(term))
                .forEach(u => {
                    const div = document.createElement("div");
                    div.className = "user-result-item";
                    div.innerHTML = `<small>${u.userid.split(" - ")[0]}</small><br><b>${u.fullname}</b>`;
                    div.onclick = () => { openChat(u.userid); toggleModal(false); };
                    results.appendChild(div);
                });
    }

    function openChat(userId) {
        selectedUser = userId;
        document.getElementById("chat-placeholder").style.display = "none";
        document.getElementById("chat-active").style.display = "flex";
        document.getElementById("active-title").innerText = userId;

        if(unsubMessages) unsubMessages();
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        unsubMessages = onSnapshot(q, (snapshot) => {
            const area = document.getElementById("messages-area");
            area.innerHTML = "";
            snapshot.docs.forEach(d => {
                const m = d.data();
                if ((m.from === myFullID && m.to === userId) || (m.from === userId && m.to === myFullID)) {
                    if (m.to === myFullID && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    const div = document.createElement("div");
                    div.className = `msg ${m.from === myFullID ? 'sent' : 'received'}`;
                    div.innerHTML = `<div>${decrypt(m.message)}</div><div class="time">${m.time}</div>`;
                    area.appendChild(div);
                }
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMessage = async function() {
        const inp = document.getElementById("msg-input");
        if(!selectedUser || !inp.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            from: myFullID, to: selectedUser, message: encrypt(inp.value.trim()),
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            timestamp: Date.now(), read: false
        });
        inp.value = "";
    }

    function encrypt(t) { return CryptoJS.AES.encrypt(t, SECRET_KEY).toString(); }
    function decrypt(c) { try { return CryptoJS.AES.decrypt(c, SECRET_KEY).toString(CryptoJS.enc.Utf8); } catch { return "---"; } }

    // Mobile scroll into view fix
    const msgInput = document.getElementById('msg-input');
    msgInput.addEventListener('focus', () => {
        setTimeout(() => msgInput.scrollIntoView({ behavior: 'smooth', block: 'end' }), 300);
    });

    init();
</script>
</body>
</html>
